name: CG DevSkim Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '17 9 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  devskim:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    # The pinned checkout and upload-sarif releases still use Node.js 20; allow until updated.
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run DevSkim
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6
        with:
          directory-to-scan: .
          should-scan-archives: false
          output-filename: devskim-results.sarif
          # Use '.' so the entrypoint resolves to /github/workspace/devskim-results.sarif
          # inside the container (passing ${{ github.workspace }} causes it to
          # prepend /github/workspace to the runner absolute path, creating a bad path)
          output-directory: '.'

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
        if: always()
        with:
          sarif_file: devskim-results.sarif
