name: CG Xanitizer Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '41 8 * * 5'
  workflow_dispatch:

# Minimal repo-wide permissions
permissions:
  contents: read

jobs:
  xanitizer:
    # If you need Windows, switch to a matrix as shown in step 2 above.
    runs-on: ubuntu-latest

    # Give code-scanning write access
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # — Java build (uncomment only if you use Java) —
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Compile Java
        if: hashFiles('pom.xml') != '' || hashFiles('build.gradle') != ''
        run: mvn -B compile

      # — JavaScript build (uncomment only if you use JS) —
      - name: Install JS deps
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run Xanitizer
        uses: RIGS-IT/xanitizer-action@v1
        with:
          license: ${{ secrets.XANITIZER_LICENSE }}

      - name: Archive Xanitizer reports
        uses: actions/upload-artifact@v4
        with:
          name: xanitizer-reports
          path: |
            *-Findings-List.pdf
            *-Findings-List.sarif

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          # Point to workspace root; upload-sarif finds all *.sarif files there
          sarif_file: ‘.’
